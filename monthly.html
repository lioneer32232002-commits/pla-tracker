<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PLA Taiwan Strait Tracker</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<nav>
  <a href="index.html">Dashboard</a>
  <a href="records.html">Daily Records</a>
  <a href="monthly.html">Monthly Analysis</a>
</nav>
<main>
  <section class="hero">
    <h1>Monthly Analysis</h1>
  </section>
  
<section class="month-section">
  <h2>2026-04</h2>
  <div class="month-stats">
    <div class="stat"><span class="stat-label">Avg Sorties/Day</span><span class="stat-val yellow">5.0</span></div>
    <div class="stat"><span class="stat-label">Peak Day</span><span class="stat-val yellow">25</span></div>
    <div class="stat"><span class="stat-label">Active Days</span><span class="stat-val">6/7</span></div>
    <div class="stat"><span class="stat-label">Avg Ships</span><span class="stat-val red">8.6</span></div>
    <div class="stat"><span class="stat-label">Avg Cross Rate</span><span class="stat-val">44.0%</span></div>
  </div>
  <div class="thumbs"><div class="thumb">
  <img src="charts/streak_2026-04-07.png" alt="2026-04-07">
  <div class="thumb-label">2026-04-07<br>1 sorties</div>
</div></div>
</section>
<section class="month-section">
  <h2>2026-03</h2>
  <div class="month-stats">
    <div class="stat"><span class="stat-label">Avg Sorties/Day</span><span class="stat-val yellow">5.7</span></div>
    <div class="stat"><span class="stat-label">Peak Day</span><span class="stat-val yellow">36</span></div>
    <div class="stat"><span class="stat-label">Active Days</span><span class="stat-val">20/31</span></div>
    <div class="stat"><span class="stat-label">Avg Ships</span><span class="stat-val red">7.9</span></div>
    <div class="stat"><span class="stat-label">Avg Cross Rate</span><span class="stat-val">71.6%</span></div>
  </div>
  <div class="thumbs"><div class="thumb">
  <img src="charts/streak_2026-03-30.png" alt="2026-03-30">
  <div class="thumb-label">2026-03-30<br>1 sorties</div>
</div></div>
</section>
</main>
</body></html>
