// 北部空域 — north of Taiwan, spans both strait and Pacific flanks

  zoneLabel([25.8,121.2],'北部空域');
}
// 西南部空域 — SW quadrant, towards Dongsha

  return d;
};
leg.addTo(map);

})();</script></section>
